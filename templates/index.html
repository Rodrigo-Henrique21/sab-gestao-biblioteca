<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Biblioteca</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <div id="login" class="container">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <button id="toggleRegister">Cadastrar-se</button>
        </div>
        <div id="register" class="container hidden">
            <h2>Cadastro</h2>
            <form id="registerForm">
                <input type="text" id="regUsername" placeholder="Username" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPassword" placeholder="Password" required>
                <button type="submit">Cadastrar</button>
            </form>
            <button id="toggleLogin">Voltar ao Login</button>
        </div>
        <div id="dashboard" class="hidden">
            <nav>
                <button id="logout">Logout</button>
                <span id="userRole"></span>
            </nav>
            <div id="userDashboard">
                <h2>Meus Livros</h2>
                <table id="livrosTable">
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>Autor</th>
                            <th>ISBN</th>
                            <th>Preço</th>
                            <th>Estoque</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <h3>Registrar Venda</h3>
                <form id="vendaForm">
                    <select id="clienteSelect" required></select>
                    <select id="livroSelect" required></select>
                    <input type="number" id="quantidade" placeholder="Quantidade" min="1" required>
                    <button type="submit">Registrar Venda</button>
                </form>
            </div>
            <div id="adminDashboard" class="hidden">
                <h2>Painel Administrador</h2>
                <button id="addLivro">Adicionar Livro</button>
                <button id="addCliente">Adicionar Cliente</button>
                <table id="adminLivrosTable">
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>Autor</th>
                            <th>ISBN</th>
                            <th>Preço</th>
                            <th>Estoque</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <table id="clientesTable">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Telefone</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <table id="vendasTable">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Livro</th>
                            <th>Quantidade</th>
                            <th>Valor Total</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <span class="close">&times;</span>
                <form id="livroForm">
                    <input type="text" id="titulo" placeholder="Título" required>
                    <input type="text" id="autor" placeholder="Autor" required>
                    <input type="text" id="isbn" placeholder="ISBN" required>
                    <input type="number" id="ano" placeholder="Ano">
                    <input type="number" step="0.01" id="preco" placeholder="Preço" required>
                    <input type="number" id="estoque" placeholder="Estoque" required>
                    <button type="submit">Salvar</button>
                </form>
            </div>
        </div>
        <div id="notification" class="notification hidden"></div>
    </div>
    <script src="/static/js/script.js"></script>
</body>
</html>
